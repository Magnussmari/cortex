# =============================================================================
# system.yaml ŌĆö the cross-cutting machine / substrate layer (IAW CFG.b)
# =============================================================================
#
# This is the BASE layer of the multi-file config layout (IAW CFG). The boot
# composer (`composeRawConfig` in src/common/config/loader.ts) reads the layered
# files in a fixed precedence order and deep-merges them into the SAME in-memory
# `LoadedConfig` cortex has always built from a single `cortex.yaml`:
#
#     system/system.yaml      ŌåÉ THIS FILE (base ŌĆö substrate / machine config)
#     network/*.yaml          (federation roster, sorted by filename)
#     surfaces/surfaces.yaml  (shared surface-gateway bindings ŌĆö CFG.c / GW)
#     stacks/*.yaml           (per-deployment policy / capabilities / agents)
#
# Later layers win on leaf keys. `system.yaml` is therefore the most GENERAL
# layer ŌĆö machine-wide substrate knobs that every stack on this host shares.
#
# Blast radius: WHOLE STACK. These are "the dangerous transport knobs"
# (design-internet-of-agentic-work.md ┬¦3.7). A wrong value here is a
# transport-level fault everywhere ŌĆö which is exactly why they are isolated in
# their own rarely-edited, reviewed-as-a-transport-change file, away from the
# routine per-stack edits in `stacks/*.yaml`.
#
# What lives here (and ONLY here): claude / execution / attachments / paths /
# nats / bus. `LoadedConfig` shape is unchanged ŌĆö these fold into the identical
# slots the single-file `cortex.yaml` populated. Single-file deployments keep
# working via the transitional fallback; you do not have to split.

# -----------------------------------------------------------------------------
# claude ŌĆö runtime config passed to spawned Claude Code sessions
# -----------------------------------------------------------------------------
claude:
  timeoutMs: 300000          # sync chat dispatch budget
  asyncTimeoutMs: 900000     # async: / team: dispatch budget
  additionalArgs: []
  allowedTools: []
  disallowedTools:
    - Write

# -----------------------------------------------------------------------------
# execution ŌĆö dispatch backend selection
# -----------------------------------------------------------------------------
execution:
  default: local
  backends: []

# =============================================================================
# inference ŌĆö model-provider config for `substrate: api-agent` (epic #2055, D6)
# =============================================================================
#
# OPT-IN AND OFF BY DEFAULT. The maps below ship EMPTY, and an agent that does
# not set `runtime.substrate: api-agent` never touches this block. `claude-code`
# remains THE DEFAULT substrate (design D3): an agent that omits `substrate` is
# completely unchanged by anything here.
#
# Two maps:
#   * `providers` ŌĆö WHERE inference is bought: the wire protocol, the egress
#     destination (`baseUrl`), and the credential REFERENCE.
#   * `profiles`  ŌĆö WHAT an agent asks for: a named provider+model+policy
#     selection an agent binds to via `runtime.inferenceProfile: <name>`.
#     Every `profiles.*.provider` MUST name a key in `providers` ŌĆö a dangling
#     reference fails config load with a per-offender error.
#
# WHY THIS LAYER: `inference` is substrate config with WHOLE-STACK blast radius,
# so it lives here beside `claude` / `execution` ŌĆö never in `stacks/*.yaml`. It
# is read from the top level of the composed config
# (`src/common/types/cortex-config.ts` ŌåÆ `InferenceConfigSchema` in
# `src/common/inference/inference-config-schema.ts`).
#
# ---------------------------------------------------------------------------
# SECURITY POSTURE ŌĆö read before adding a provider (design ┬¦"Secrets and egress")
# ---------------------------------------------------------------------------
#
#   1. CREDENTIALS ARE REFERENCES, NEVER LITERALS. `apiKey` and every `headers`
#      value must be the exact form `env:NAME` (`src/common/inference/secret-ref.ts`).
#      A literal key is REJECTED at config load ŌĆö this is enforced, not advisory.
#      The reference is resolved from that environment variable in the cortex
#      daemon's own environment; the parsed config only ever holds `env:NAME`, so
#      a config dump or log shows the reference and never the secret.
#      NOTE (#2110): every provider A PROFILE REFERENCES is built ŌĆö and so its
#      reference RESOLVED ŌĆö at BOOT pre-flight, not lazily on first dispatch.
#      The pre-flight walks PROFILES, so a provider no profile names is never
#      built and its variable is never read: declaring an unused provider with
#      an unset variable is silent at boot, and only surfaces when a profile
#      first points at it. Export the variable in the daemon's environment
#      before boot; an unset variable is reported on stderr per-profile and that
#      profile fails closed at dispatch (it does NOT take the daemon down ŌĆö
#      unrelated claude-code agents boot fine).
#
#   2. `baseUrl` IS A REVIEWED MODEL-EGRESS DESTINATION. It is where prompt text
#      leaves this machine. It has whole-stack blast radius and this block is the
#      single place those destinations are declared ŌĆö treat adding or changing one
#      as an egress review, not a config tweak.
#
#   3. PROVIDER/PROFILE CHANGES ARE POLICY CHANGES (D6). They move data
#      residency, model class, retention, and cost. Review them as policy.
#
#   4. NEVER route a credential through a profile's `options` bag ŌĆö `options` is
#      an opaque passthrough with NO secret-reference validation. Credentials go
#      in `apiKey` / `headers` only.
#
# ---------------------------------------------------------------------------
# KNOWN LIMITATIONS TODAY ŌĆö the api-agent substrate is Phase 1 (text-only)
# ---------------------------------------------------------------------------
#
#   * NO TOOLS (D5). The API harness ships no tool loop: no Bash, no file
#     edits, no skills. A request carrying attachments or requiring tools is
#     rejected with an `unsupported_capability` terminal BEFORE any provider
#     call. Do NOT expect coding-agent parity ŌĆö this is a chat/text turn.
#     (Tools are Phase 3.) Point `api-agent` at prose work, not at code work.
#   * NO STREAMING PROGRESS. cortex has no progress-envelope constructor; the
#     harness emits exactly one `started` and one terminal envelope per
#     dispatch, accumulating the assistant text and delivering it ALL on the
#     terminal. A principal sees one final block, not incremental output.
#   * USAGE lands on Mission Control; COST stays empty. Token counts from an
#     api-agent dispatch project onto the MC session row (#2115). `cost_usd` is
#     written ONLY when the provider itself reports a price ŌĆö cortex consults no
#     price table (design Q7 is unanswered, so an estimate would have nowhere
#     honest to be labelled). No api-agent provider reports a price today, so in
#     practice cost stays empty. Do not read a blank cost as "free".
#   * OUTPUT BOUNDS DIFFER BY PROTOCOL. `maxOutputTokens` + `options` now reach
#     the provider (#2114), but what an OMITTED `maxOutputTokens` means is
#     protocol-specific:
#       - `anthropic-messages`   ŌåÆ the adapter's own default of 4096 tokens.
#       - `openai-chat-completions` ŌåÆ NO bound is sent; the server's default
#         applies (whatever the endpoint decides ŌĆö it may be much larger).
#     Set `maxOutputTokens` explicitly if you care about the cap.
#   * THE `options` BAG OVERRIDES DIFFERENTLY BY PROTOCOL (#2120) ŌĆö a live
#     footgun. On `openai-chat-completions` the bag merges LAST, so an
#     `options.openai.max_tokens` SILENTLY OVERRIDES the `maxOutputTokens` you
#     declared. On `anthropic-messages` the bag merges FIRST and the core fields
#     win, so the same key is silently IGNORED. Same config, opposite outcomes:
#     prefer `maxOutputTokens` and keep wire knobs out of `options`.
#   * `modelClass` / `dataResidency` ARE CARRIED, NOT YET ENFORCED (#2117).
#     They are validated, resolved, and attached to the profile, but admission
#     does not yet gate a dispatch on them. Do not treat them as a control.
#   * NO DURABLE CONVERSATION (Phase 2). Each dispatch rebuilds the turn from
#     the request alone: the persona becomes the system instructions and the
#     prompt becomes a single user turn. There is no multi-turn memory.
#
# ---------------------------------------------------------------------------
# EXAMPLE ŌĆö copy the shape, then uncomment + adapt (inert until you do)
# ---------------------------------------------------------------------------
#
# inference:                                  # <-- begin inference reference example
#   providers:
#     anthropic:
#       protocol: anthropic-messages          # or: openai-chat-completions
#       baseUrl: https://api.anthropic.com    # the reviewed egress destination
#       apiKey: env:ANTHROPIC_API_KEY         # REFERENCE ONLY ŌĆö a literal is rejected at load
#       # Optional extra headers. Values are ALSO `env:NAME` references (a header
#       # can carry a token), resolved at call time, never literals.
#       # headers:
#       #   x-example-gateway-token: env:<REPLACE_ME_HEADER_ENV_VAR>
#     local-ollama:
#       protocol: openai-chat-completions
#       baseUrl: http://127.0.0.1:11434/v1    # loopback ŌĆö nothing leaves the box
#       apiKey: env:OLLAMA_API_KEY            # still a reference (Ollama ignores the value)
#       # Optional STATIC capability override. Configured-only ŌĆö cortex never
#       # probes a provider at startup, so whatever you declare here is the whole
#       # truth. Declare only the flags you mean to override.
#       capabilities:
#         streaming: true
#         tools: false
#         images: false
#         structuredOutput: false
#   profiles:
#     claude-sonnet:
#       provider: anthropic                   # MUST name a key in providers above
#       model: claude-sonnet-4-6
#       maxOutputTokens: 8192                 # reaches the provider as the output cap
#       modelClass: frontier                  # local-only | frontier | any (carried, not enforced ŌĆö #2117)
#       dataResidency: us                     # opaque label (carried, not enforced ŌĆö #2117)
#     local-qwen:
#       provider: local-ollama
#       model: qwen3-coder
#       maxOutputTokens: 8192                 # reaches the provider as the output cap
#       modelClass: local-only
#       dataResidency: nz
#       # Q5 escape hatch: ONE namespaced, opaque bag of provider-only knobs,
#       # keyed by provider namespace. Reaches the wire (#2114). Portable
#       # behaviour must never depend on anything in here, and a credential must
#       # NEVER be routed through it (no secret-reference validation applies).
#       # Precedence differs by protocol (#2120): on `openai-chat-completions`
#       # the bag merges LAST and CAN silently override core fields such as
#       # `max_tokens`; on `anthropic-messages` it merges FIRST and core fields
#       # win. Keep wire knobs cortex already models OUT of here.
#       # options:
#       #   anthropic:
#       #     <REPLACE_ME_VENDOR_KNOB>: <REPLACE_ME_VALUE>
#                                             # <-- end inference reference example
#
# Then bind an agent to a profile in stacks/<slug>.yaml (see the commented
# api-agent example beside the `ivy` agent there):
#
#   runtime:
#     substrate: api-agent
#     inferenceProfile: claude-sonnet
#
# Active default: both maps EMPTY. With no profiles there is no boot pre-flight
# output and no behaviour change. An `api-agent` agent bound to a profile that
# is not defined here fails closed at dispatch with a clear terminal ŌĆö it never
# silently falls back to some default model.
inference:
  providers: {}
  profiles: {}

# -----------------------------------------------------------------------------
# attachments ŌĆö inbound file-handling limits
# -----------------------------------------------------------------------------
attachments:
  enabled: true
  maxFileSizeBytes: 10485760      # 10 MiB per file
  maxTotalSizeBytes: 26214400     # 25 MiB per message
  maxAttachmentsPerMessage: 10

# -----------------------------------------------------------------------------
# paths ŌĆö on-disk locations cortex reads/writes (leading ~ expands to $HOME)
# -----------------------------------------------------------------------------
paths:
  publishedEventsDir: ~/.local/share/metafactory/cortex/events/published
  logDir: ~/.local/state/metafactory/cortex/logs

# -----------------------------------------------------------------------------
# plugins ŌĆö out-of-tree surface-plugin bundle loading (cortex#1792, ADR-0024)
# -----------------------------------------------------------------------------
# `external: false` (the secure default) means the daemon loads ONLY its
# in-tree adapter/renderer registrations at boot ŌĆö `arc install`-ed plugin
# bundles are discovered but not imported. Flip to `true` to opt this stack
# into `await import()`-ing installed bundle code at boot (full daemon
# authority, no sandbox ŌĆö ADR-0024 D4; an `arc install` is an explicit,
# reviewed act, and an `arc upgrade` of an installed bundle re-executes new
# code with that same authority, so treat both as code-review events).
#
# EXCEPTION (ADR-0024 ┬¦OQ9): a first-party RENDERER bundle ŌĆö one on cortex's
# own in-tree allowlist (`src/adapters/loader.ts`'s
# `isFirstPartyRendererBundle`; never the bundle's own manifest or arc's
# `tier` field, both of which the bundle author controls) ŌĆö loads even when
# `external` is off. Rationale: "don't load third-party code" is secure for
# adapters, but fail-open for a paging sink ŌĆö a stack with an uninstalled or
# unloaded PagerDuty bundle must not silently stop paging.
#
# EXCEPTION, extended (cortex#1794 S9a, epic #1784 "transparent repackaging"
# decision, 2026-07-12): a first-party ADAPTER bundle ŌĆö one whose repoUrl is
# declared under CORTEX's OWN, PR-reviewed `arc-manifest.yaml` `dependencies:`
# AND whose dependency name follows the compass#115
# `metafactory-cortex-adapter-<name>` naming standard
# (`src/adapters/loader.ts`'s `isFirstPartyBundle` / `readCortexDeclaredAdapterRepos`;
# again never the bundle's own manifest, `tier`, or any other bundle-author-
# controlled signal) ŌĆö ALSO loads even when `external` is off. The naming
# check matters: cortex declares OTHER dependencies too (`arc`, the package
# manager; `metafactory-bundle-discord`, ADR-0017 CLI/skill tooling) that must NOT
# get an adapter's flag-off exemption just because they're declared for some
# unrelated reason (PR #1942 code-review fix). Rationale: extracting an
# in-tree adapter (e.g. `web`) into its own arc bundle must be a transparent,
# non-breaking repackage ŌĆö `arc upgrade cortex` auto-installs the declared
# bundle and the surface keeps working with ZERO config change, not a silent
# surface outage behind a flag nobody flipped. `external` keeps its real job
# of gating genuinely THIRD-party plugins ŌĆö nothing cortex itself declares as
# a first-party adapter bundle by name.
plugins:
  external: false

# =============================================================================
# nats ŌĆö M2 transport. THE SINGLE PLACE SUBJECT OVERRIDES LIVE (IAW CFG.b.2)
# =============================================================================
#
# `nats.subjects` below is the most dangerous block in the whole config, and it
# is isolated HERE ŌĆö one place, one owner, reviewed as a transport change ŌĆö so
# it can never be duplicated across per-stack files. That per-stack duplication
# is what drove the double-message problem: two layers each listing the same
# subscribe pattern double-bound the boot subscriber, so every inbound envelope
# was delivered AND dispatched twice (cortex#491; the `pre-natsdedup` era).
nats:
  url: nats://127.0.0.1:4222
  name: cortex

  # ---------------------------------------------------------------------------
  # nats.subjects ŌĆö push-mode broad-pattern subscriber list. (THE LANDMINE.)
  # ---------------------------------------------------------------------------
  #
  # Default empty (`[]`) = pull-only mode (cortex#337). KEEP IT EMPTY unless you
  # know exactly why you are adding a pattern. The runner's dispatch-listener
  # self-subscribes its canonical `local.{principal}.{stack}.tasks.*.>` interest
  # at start() (cortex#477/#479), so it is the SOLE binder for inbound tasks.
  # Listing that same pattern here re-creates the boot-subscriber, double-binds
  # the same handler set, and double-delivers + double-dispatches every
  # chat/Direct/Delegate envelope ŌĆö the double-message problem (cortex#491).
  #
  # The loader validates this block LOUDLY at load (IAW CFG.b.3,
  # src/common/types/nats-subjects.ts):
  #   - a malformed pattern (whitespace, empty segment, misplaced `>`) is rejected
  #     with a clear error ŌĆö never parsed into a silent partial config;
  #   - a DUPLICATE pattern is rejected with the index of the first occurrence,
  #     because a duplicate is precisely the double-bind footgun.
  #
  # Placeholder tokens `{principal}` / `{stack}` are substituted at runtime.
  # Example (commented ŌĆö do NOT enable without understanding the double-bind):
  #   subjects:
  #     - local.{principal}.{stack}.tasks.*.>
  subjects: []

  # NKey identity for envelope signing is PER-STACK and lives in
  # stacks/<slug>.yaml ŌĆö `stack.nkey_seed_path` + `stack.nkey_pub`, which
  # `arc upgrade cortex` auto-provisions on first install (seed at
  # ~/.config/nats/cortex-<slug>.nk, chmod 600) and which the runtime signer
  # actually reads. This machine-wide layer ships NO active `identity:` block by
  # default: a per-stack key does not belong in the shared substrate file, and a
  # placeholder here is never reconciled by provisioning (cortex#2052). This
  # `nats.identity` field remains schema-optional purely as a machine-wide
  # OVERRIDE ŌĆö uncomment only if you fully understand it, with a REAL pubkey:
  # identity:
  #   seedPath: ~/.config/nats/cortex-<slug>.nk
  #   publicKey: U...   # the real U-prefixed pubkey (56 chars), NOT a placeholder

# -----------------------------------------------------------------------------
# bus ŌĆö application-level JetStream stream / consumer provisioning
# -----------------------------------------------------------------------------
bus:
  review:
    stream:
      name: CODE_REVIEW
      maxAgeSeconds: 86400      # 24h retention for unclaimed review tasks
      maxBytes: 536870912       # 512 MiB finite cap
    consumer:
      maxDeliver: 5             # attempts before JetStream stops redelivery
