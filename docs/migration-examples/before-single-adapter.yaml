# Minimal pre-cutover cortex.yaml — one operator, one agent (Luna), one
# Discord adapter, no `policy:` block. Run through `cortex migrate-config`
# to produce the matching `after-single-adapter.yaml`.

operator:
  id: andreas
  displayName: Andreas
  discordId: "333333333333333333"
  dataResidency: NZ

stack:
  id: andreas/example

agents:
  - id: luna
    displayName: Luna
    persona: ./personas/luna.md
    roles: []
    trust: []
    presence:
      discord:
        enabled: true
        token: REDACTED
        guildId: "111"
        agentChannelId: "222"
        logChannelId: "333"
        defaultRole: denied
        roles:
          - name: operator
            users: ["333333333333333333"]
            features: [chat, async, team]
          - name: user
            users: ["222222222222222222"]
            features: [chat]
          - name: agent-echo
            users: ["999000111"]
            features: [chat, async, team]
        dm:
          operatorRole:
            features: [chat, async, team]
            allowedDirs: ["~/Developer"]
