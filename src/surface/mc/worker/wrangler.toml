name = "cortex-api"
main = "src/index.ts"
compatibility_date = "2025-03-30"
compatibility_flags = ["nodejs_compat"]
# S-001: Defense-in-depth — workers_dev = false at base level too, not just in env.production.
# A bare `wrangler deploy` (without --env) must not re-expose the .workers.dev URL.
workers_dev = false

# Base vars for local dev (wrangler dev)
[vars]
CORS_ORIGIN = "http://localhost:8767,http://localhost:8765"

# Base bindings for local dev (wrangler dev uses these defaults)
[[d1_databases]]
binding = "CORTEX_DB"
database_name = "cortex-events-local"
database_id = "placeholder-local-id"

[[kv_namespaces]]
binding = "CORTEX_KEYS"
id = "placeholder-local-kv-id"

# DashboardSocket DO — backs the dashboard WebSocket (/ws). Named environments
# do NOT inherit top-level DO bindings, so it is re-declared in each env below;
# this base binding covers bare `wrangler dev`. The migration is top-level and
# shared across environments.
[[durable_objects.bindings]]
name = "DASHBOARD_SOCKET"
class_name = "DashboardSocket"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DashboardSocket"]

# ──────────────────────────────────────────────────────────────────
# Environment: Development (cortex-dev.meta-factory.{ai,dev,io})
# ──────────────────────────────────────────────────────────────────
[env.dev]
name = "cortex-api-dev"
workers_dev = false
routes = [
  { pattern = "cortex-dev.meta-factory.ai/api/*", zone_name = "meta-factory.ai" },
  { pattern = "cortex-dev.meta-factory.ai/admin/*", zone_name = "meta-factory.ai" },
  { pattern = "cortex-dev.meta-factory.ai/ws", zone_name = "meta-factory.ai" },
  { pattern = "cortex-dev.meta-factory.dev/api/*", zone_name = "meta-factory.dev" },
  { pattern = "cortex-dev.meta-factory.dev/admin/*", zone_name = "meta-factory.dev" },
  { pattern = "cortex-dev.meta-factory.dev/ws", zone_name = "meta-factory.dev" },
  { pattern = "cortex-dev.meta-factory.io/api/*", zone_name = "meta-factory.io" },
  { pattern = "cortex-dev.meta-factory.io/admin/*", zone_name = "meta-factory.io" },
  { pattern = "cortex-dev.meta-factory.io/ws", zone_name = "meta-factory.io" }
]

# DashboardSocket DO binding (dev) — env configs don't inherit the base binding.
[[env.dev.durable_objects.bindings]]
name = "DASHBOARD_SOCKET"
class_name = "DashboardSocket"

[env.dev.vars]
CORS_ORIGIN = "https://cortex-dev.meta-factory.ai,https://cortex-dev.meta-factory.dev,https://cortex-dev.meta-factory.io,http://localhost:8767,http://localhost:8765"
ENVIRONMENT = "development"

# Dev D1 (cortex-events-dev, provisioned 2026-06-04, region OC)
[[env.dev.d1_databases]]
binding = "CORTEX_DB"
database_name = "cortex-events-dev"
database_id = "44d8f835-cb8e-4c1e-b6ca-21572f44ba03"

# Dev KV (cortex-keys-dev, provisioned 2026-06-04)
[[env.dev.kv_namespaces]]
binding = "CORTEX_KEYS"
id = "078d4e580a8c4d39a431a19dde191102"

# ──────────────────────────────────────────────────────────────────
# Environment: Production (cortex.meta-factory.{ai,dev,io})
# ──────────────────────────────────────────────────────────────────
[env.production]
name = "cortex-api"
# S-001: Disabled workers_dev to prevent CF Access bypass via .workers.dev URL
workers_dev = false

# S-058: Same-subdomain routing — Worker handles /api/* and /admin/* on the
# dashboard domain across all three TLDs (.ai, .dev, .io). CF Access cookie
# covers dashboard and API on each TLD (no cross-origin cookie issue).
# CF route priority: these specific-path Worker routes take priority over
# the CF Pages catch-all on the same domain. Non-API paths serve the dashboard.
#
# M2M traffic: NO CF Access bypass policies. Instead:
# - GitHub webhooks arrive via cortex-webhook-proxy (hooks.meta-factory.ai),
#   which validates HMAC, then forwards via Service Binding (direct
#   Worker-to-Worker tunnel, no CF Access needed).
# - Bot ingest/sync includes CF Access service token headers directly,
#   authenticated via Service Auth policy with "Grove Bot" service token.
routes = [
  { pattern = "cortex.meta-factory.ai/api/*", zone_name = "meta-factory.ai" },
  { pattern = "cortex.meta-factory.ai/admin/*", zone_name = "meta-factory.ai" },
  { pattern = "cortex.meta-factory.ai/ws", zone_name = "meta-factory.ai" },
  { pattern = "cortex.meta-factory.dev/api/*", zone_name = "meta-factory.dev" },
  { pattern = "cortex.meta-factory.dev/admin/*", zone_name = "meta-factory.dev" },
  { pattern = "cortex.meta-factory.dev/ws", zone_name = "meta-factory.dev" },
  { pattern = "cortex.meta-factory.io/api/*", zone_name = "meta-factory.io" },
  { pattern = "cortex.meta-factory.io/admin/*", zone_name = "meta-factory.io" },
  { pattern = "cortex.meta-factory.io/ws", zone_name = "meta-factory.io" }
]

# DashboardSocket DO binding (production) — config ready; deploy is a separate
# promote (this work deploys --env dev only).
[[env.production.durable_objects.bindings]]
name = "DASHBOARD_SOCKET"
class_name = "DashboardSocket"

[env.production.vars]
# S-002: CORS for production — restricted to dashboard origins (all three TLDs).
# NOTE: Do NOT use "" here — JS falsy-string fallback in the CORS middleware
# would resolve "" || "*" to wildcard. Use the explicit dashboard URLs.
CORS_ORIGIN = "https://cortex.meta-factory.ai,https://cortex.meta-factory.dev,https://cortex.meta-factory.io"
ENVIRONMENT = "production"

# Production D1 (existing)
[[env.production.d1_databases]]
binding = "CORTEX_DB"
database_name = "cortex-events"
database_id = "d13d6f3e-e5c0-47b6-bc3f-165ee8bca0f7"

# Production KV (existing)
[[env.production.kv_namespaces]]
binding = "CORTEX_KEYS"
id = "303f2784ce30456396e3b9acf055b336"

# Secrets (set via wrangler secret put --env production):
# ADMIN_SECRET - admin key for key management
# GITHUB_WEBHOOK_SECRET - GitHub webhook HMAC secret
# GITHUB_TOKEN - GitHub PAT for sync operations
# GITHUB_REPOS - comma-separated list of owner/repo
# CF_ACCESS_AUD - CF Access Application audience tag
