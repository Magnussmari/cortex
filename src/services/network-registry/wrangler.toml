name = "cortex-network-registry"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# IAW D.4 — cloud-side network registry service. Public REST surface
# at network.meta-factory.ai (per the plan; the operational DNS choice
# is finalised at deploy time). Auth model:
#
#   POST /principals/{principal_id}/register
#     — open endpoint. Authenticity is enforced by the request BODY
#     carrying a signed assertion: the principal signs their own
#     registration with their principal NKey. The registry verifies the
#     signature against the principal's CURRENT pubkey (or, on first
#     register, trust-on-first-use; rotation requires the previous key
#     to sign the new one — out of scope for v1, follow-up).
#
#   GET endpoints
#     — public read. Responses are SIGNED ASSERTIONS produced by the
#     registry's own Ed25519 key (REGISTRY_SIGNING_KEY) so that cortex
#     peers verify the chain before trusting cached pubkeys.
#
# No CF Access bypass policies on this Worker. M2M traffic (principal
# cortex publishing their pubkey, peer cortex querying) authenticates
# at the application layer via Ed25519 signatures — same defense-in-
# depth pattern as S-058 in grove-api.
workers_dev = false

# Base vars for local dev (wrangler dev)
[vars]
ENVIRONMENT = "local"

# ──────────────────────────────────────────────────────────────────
# #682 — D1-backed durable storage (principals + nonce-replay cache).
#
# The registry's principal directory AND its nonce-replay cache live in
# D1 so both survive Worker-isolate recycling. This is the durability
# gate before the PROD deploy: an in-memory store loses registrations on
# every isolate restart, and an in-memory nonce cache lets an in-flight
# registration be replayed against a fresh isolate within the skew
# window. D1 is a single logical database shared by every isolate/colo,
# so a nonce seen anywhere is rejected everywhere — closing the
# documented cross-isolate replay gap.
#
# The `binding` name is `DB` in EVERY environment (base/dev/prod); only
# `database_name` + `database_id` differ per env. The code reads
# `env.DB` and falls back to the in-memory backend when it is absent
# (`wrangler dev` without a configured local DB, and `bun test`).
#
# This base binding points at the dev database so a bare `wrangler dev`
# / top-level `wrangler deploy` has a DB. Deploys MUST always pass
# `--env dev` or `--env production`; the per-env blocks below override
# `database_id`.
#
# Apply migrations per environment (migrations/0001_init.sql):
#   bunx wrangler d1 migrations apply cortex-network-registry-dev --env dev --remote
#   bunx wrangler d1 migrations apply cortex-network-registry      --env production --remote
[[d1_databases]]
binding = "DB"
database_name = "cortex-network-registry-dev"
database_id = "19925196-a7ba-4fe0-85fa-4c8181a96bba"
migrations_dir = "migrations"

# ──────────────────────────────────────────────────────────────────
# Environment: Development
# ──────────────────────────────────────────────────────────────────
[env.dev]
name = "cortex-network-registry-dev"
workers_dev = false

# #682 — dev D1 (cortex-network-registry-dev). Same `binding = "DB"` as
# prod; only the database differs.
[[env.dev.d1_databases]]
binding = "DB"
database_name = "cortex-network-registry-dev"
database_id = "19925196-a7ba-4fe0-85fa-4c8181a96bba"
migrations_dir = "migrations"

# Dev route. The principal must create the proxied DNS record for
# network-dev.meta-factory.ai in the meta-factory.ai zone, then
# `wrangler deploy --env dev`. Same-zone TLS + CF Access still apply.
# Additional TLDs (.dev/.io) can be added analogously if multi-TLD is wanted.
routes = [
  { pattern = "network-dev.meta-factory.ai/*", zone_name = "meta-factory.ai" }
]

[env.dev.vars]
ENVIRONMENT = "development"
# #747 — REGISTRY_ADMIN_PUBKEYS is a SECRET, set at deploy time (NOT here):
#   bunx wrangler secret put REGISTRY_ADMIN_PUBKEYS --env dev
# Comma-separated base64 Ed25519 admin pubkeys authorised for
# POST /networks/:id (signed-admin create/update). FAIL-CLOSED: if unset/empty
# the route returns 503 admin_not_configured and writes NOTHING — never an
# anonymous hub_url write. Per dev=prod parity, dev is NOT laxer: the same
# fail-closed gate applies. Do NOT put a real key in this file.

# ──────────────────────────────────────────────────────────────────
# #680 — App-layer rate limiting (PARITY GUARD: dev == prod).
#
# These two bindings MUST stay byte-identical to the [env.production]
# block below in `limit` and `period` and in which endpoints they
# guard. `network-dev.meta-factory.ai` and `network.meta-factory.ai`
# are BOTH public internet endpoints; dev is NOT a laxer posture.
# If you change a limit, change it in BOTH blocks.
#
# The only legitimate per-env difference is `namespace_id` (CF requires
# a distinct ratelimit namespace id per environment). The LIMIT VALUES
# are also mirrored in code (src/rate-limit.ts RATE_LIMITS) which is the
# active fallback where the native binding is absent (wrangler dev / test).
#
#   RL_REGISTER → POST /principals/:id/register   (strict: 5 / 60s)
#   RL_READ     → GET resolve / roster / capabilities (loose: 120 / 60s)
[[env.dev.unsafe.bindings]]
name = "RL_REGISTER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[env.dev.unsafe.bindings]]
name = "RL_READ"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 120, period = 60 }

# ──────────────────────────────────────────────────────────────────
# Environment: Production (network.meta-factory.ai)
# ──────────────────────────────────────────────────────────────────
[env.production]
name = "cortex-network-registry"
workers_dev = false

# Production route. The principal must create the proxied DNS record for
# network.meta-factory.ai in the meta-factory.ai zone, then
# `wrangler deploy --env production`. Same-zone TLS + CF Access still apply.
# Additional TLDs (.dev/.io) can be added analogously if multi-TLD is wanted.
routes = [
  { pattern = "network.meta-factory.ai/*", zone_name = "meta-factory.ai" }
]

# #682 — production D1 (cortex-network-registry). Same `binding = "DB"`
# as dev; only the database differs.
[[env.production.d1_databases]]
binding = "DB"
database_name = "cortex-network-registry"
database_id = "cb822de5-aba5-4f72-897e-299d274daa2f"
migrations_dir = "migrations"

[env.production.vars]
ENVIRONMENT = "production"
# #747 — REGISTRY_ADMIN_PUBKEYS is a SECRET, set at deploy time (NOT here):
#   bunx wrangler secret put REGISTRY_ADMIN_PUBKEYS --env production
# Comma-separated base64 Ed25519 admin pubkeys authorised for
# POST /networks/:id (signed-admin create/update). FAIL-CLOSED: if unset/empty
# the route returns 503 admin_not_configured and writes NOTHING — never an
# anonymous hub_url write (the descriptor-poisoning vuln #745 → #747 closes).
# Do NOT put a real key in this file.

# ──────────────────────────────────────────────────────────────────
# #680 — App-layer rate limiting (PARITY GUARD: prod == dev).
#
# These two bindings MUST stay byte-identical to the [env.dev] block
# above in `limit` and `period` and in which endpoints they guard.
# Both hostnames are public; prod is NOT a stricter posture and dev is
# NOT a laxer one — they are the SAME. The only per-env difference is
# `namespace_id` (CF requires a distinct ratelimit namespace per env).
# If you change a limit, change it in BOTH blocks.
#
#   RL_REGISTER → POST /principals/:id/register   (strict: 5 / 60s)
#   RL_READ     → GET resolve / roster / capabilities (loose: 120 / 60s)
[[env.production.unsafe.bindings]]
name = "RL_REGISTER"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 5, period = 60 }

[[env.production.unsafe.bindings]]
name = "RL_READ"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 120, period = 60 }

# Secrets (set via `wrangler secret put --env production`):
#   REGISTRY_SIGNING_KEY  — base64-encoded PKCS#8 Ed25519 private key used
#                           to sign GET responses (registry assertions).
#                           Format: base64 PKCS#8 Ed25519 private key — the
#                           exact shape the Worker derives its pubkey from via
#                           pubkeyFromPkcs8() (src/signing.ts) at boot. (NOT a
#                           raw seed+pubkey concatenation — #677.)
#                           Generate one with:
#                             bun run gen-key            # in this directory
#                           then paste the printed REGISTRY_SIGNING_KEY value:
#                             bunx wrangler secret put REGISTRY_SIGNING_KEY
#                           The corresponding public key is exposed at
#                           GET /registry/pubkey so peers can pin it at
#                           config time (and is printed by `gen-key`).
#
#   REGISTRY_ADMIN_PUBKEYS — #747. Comma-separated base64 Ed25519 admin
#                           pubkeys authorised to create/update network
#                           topology records via POST /networks/:id (the
#                           secure signed-admin replacement for raw-SQL/D1
#                           seeding). The matching admin SEED (nkey SU…) is
#                           held by the network admin and used by
#                           `cortex network create --admin-seed`; only the
#                           PUBLIC key goes here. FAIL-CLOSED: if this secret
#                           is unset/empty the route returns 503
#                           admin_not_configured and persists NOTHING — there
#                           is never an anonymous hub_url write.
#                             bunx wrangler secret put REGISTRY_ADMIN_PUBKEYS
