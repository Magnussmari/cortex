name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Compass governance validators are vendored at .github/scripts/ rather than
# pulled from a sibling checkout of the-metafactory/compass. Original setup
# (cross-repo checkout via GH_PAT_COMPASS_RO) failed on every run since the
# MIG-0 bootstrap because (a) the PAT secret was never provisioned and (b)
# compass's engine/ci/ only contains label-check.ts (no run-all.ts).
# Vendoring follows the same pattern as the myelin envelope schema vendor
# at src/bus/myelin/vendor/ (cortex#11 G-1100.B). Update the vendored copy
# when compass evolves its validator surface.
# Tracked at cortex#16.
jobs:
  validators:
    name: Compass governance validators
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # `gh label list` queries GraphQL `repository.labels`, which requires
      # the `issues: read` scope (labels live under the issues subsystem
      # in GitHub's permission model). Without this the call fails with
      # "Resource not accessible by integration".
      issues: read
    steps:
      - name: Checkout cortex
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Label check
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun .github/scripts/label-check.ts the-metafactory/cortex

  # ──────────────────────────────────────────────────────────────────
  # Lint — strict ESLint gate. Ported from arc + myelin patterns
  # (arc PR #150 sweep + myelin#120..#127 chain). Baseline at port
  # time was ~1261 errors; sweeps #1..#38 drove it to 0 (cortex PRs
  # #152..#191). Gate is now blocking — new code must pass lint.
  # ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: ESLint (errors only — blocking gate)
        run: bun run lint:errors

  # ──────────────────────────────────────────────────────────────────
  # Typecheck — `tsc --noEmit` against the project's tsconfig.json.
  # Pre-cortex#376 there was no CI gate against type errors, so 5
  # pre-existing errors sat on `main` undetected (cleared in PR #382).
  # Blocking gate; matches the lint job's contract.
  # ──────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: tsc --noEmit
        run: bunx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────
  # Vocab carve-out gate — the 0002 vocabulary-migration ratchet.
  # Runs scripts/check-carveouts.sh, which FAILS when any UNGATED
  # R-cluster deprecated term (operator / OperatorConfig / BotConfig /
  # home_operator / operator.input eventKinds / broadcast emission /
  # operatorId) appears as a LIVE VIOLATION in src/ or docs/, EXCLUDING
  # the enumerated carve-out allowlist (NSC OP_*, GROVE_* env tier,
  # migrate-config legacy reader, frozen SQL DDL, grove-* historical
  # refs, platform-bot terms, myelin-GATED R4/R5/R10/R11 transition
  # shims, and the "Operator vision" label).
  #
  # Spec: docs/migrations/0002-vocabulary-finish-2026-05.md §"0001-carve-out
  # self-check" (the TODO ratchet) + §"Completion signal" (the allowlist).
  #
  # On a per-PR basis the same script can be pointed at the diff:
  #   git diff --name-only origin/main... | scripts/check-carveouts.sh -
  # The whole-tree scan below is the merge gate.
  # ──────────────────────────────────────────────────────────────────
  vocab-carveout-gate:
    name: Vocab carve-out gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # check-wire-vocab.ts (added below) runs under bun.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # WHOLE-TREE ratchet (cortex#436): the 0002 vocabulary migration is COMPLETE
      # — the v4.0.0 breaking cut (#520) removed the legacy operator readers and the
      # tree is at ZERO ungated violations. The gate now scans the whole tree (its
      # design target), so a PR fails only if IT introduces a violation — and there
      # are no diff-mode false-positives on pre-existing carve-out lines in files a
      # PR happens to touch (the reason the old diff-mode forced --admin merges).
      - name: check-carveouts (whole-tree)
        run: bash scripts/check-carveouts.sh

      # Wire-layer-notation rules (compass#125, standards/domain-grounding.md
      # §5) — EXTENDS this gate with the M-notation layer-model rule set the
      # carve-out ratchet never knew. It proved blind to the historical layer
      # residuals fixed in compass#125 (vocab-allow: names the `L7` residual).
      # V1–V3 (the banned layer-model aliases)
      # are BLOCKING; V4 (bare L[1-7]) is warn-only
      # during the L→M doc-sweep burn-in (promote with --enforce-l4). Also runs
      # the §2.2 RFC-filename no-drift check against the myelin pack (resolved
      # via `gh api`; skips non-blocking if myelin is unreachable).
      - name: check-wire-vocab (layer-model notation + RFC no-drift)
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun scripts/check-wire-vocab.ts

  # ──────────────────────────────────────────────────────────────────
  # Test — `bun test` runs the full unit/integration suite. Pre-cortex#376
  # CI never ran tests, so cortex#366 (originator security regression)
  # sat on main even though a test covered it. This gate is the
  # enforcement layer under every other correctness guarantee.
  #
  # Tests that spawn the real `claude` binary self-skip on CI via
  # `test.skipIf(!hasClaude)` (src/common/test-utils.ts) — the binary
  # is not installed on GitHub Actions runners.
  # ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: bun test
        run: bun test

  # ──────────────────────────────────────────────────────────────────
  # Surface-SDK .d.ts drift guard (cortex#1950). The shippable, self-contained
  # plugin-SDK type artifact (src/surface-sdk/generated/surface-sdk.d.ts) is
  # GENERATED from the barrel (src/surface-sdk/index.ts) by `bun run sdk:dts`.
  # Out-of-tree bundles resolve it via package.json exports["./surface-sdk"];
  # if it drifts from the barrel, a bundle compiles against stale types. This
  # job regenerates it and fails on any diff — so a merged artifact is always
  # byte-identical to what the current barrel produces, and it can never go
  # stale the way the old per-bundle hand-vendored copies did.
  # ──────────────────────────────────────────────────────────────────
  surface-sdk-dts-sync:
    name: Surface-SDK .d.ts sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: regenerate + diff (bun run sdk:dts:check)
        run: bun run sdk:dts:check

  # ──────────────────────────────────────────────────────────────────
  # Shippable-config hygiene gate — L2 of the confidentiality program
  # (design doc §4 L2, compass#81/#87). A DETERMINISTIC whole-tree check
  # that FAILS if deployment-specific content lands in a shippable path:
  # a live platform id (snowflake) or internal-domain email in an agent
  # fragment (agents.d/*.yaml, personas/*.md, arc-manifest*.yaml), a real
  # (non-placeholder) identity in seed/migration SQL, a presence-bearing
  # fragment not declared `# audience: generic`, or an unparseable YAML
  # fragment (fail-closed). Output is MASKED — rule id + file:line + a
  # shape descriptor, never the matched literal — so the gate never
  # re-leaks what it catches. This is the structural complement to the
  # L1 confidentiality-gate caller (ci/conf-gate-caller); it closes the
  # root-cause class of the cortex#1312 incident (class 9: deployment
  # fragment in a shippable path).
  #
  # Unlike the L1 gate (warn-only burn-in), this is a BLOCKING gate from
  # day 1 — it verified green on the whole tree at authoring time, so it
  # can only fail on content a PR newly introduces (design doc §4 L2
  # "zero-entry ratchet"). Enrolling it in the protect-main required
  # checks alongside the existing contexts is a held ops step.
  # ──────────────────────────────────────────────────────────────────
  shippable-hygiene:
    name: Shippable-config hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: check-shippable-hygiene (whole-tree)
        run: bun scripts/check-shippable-hygiene.ts

  # ──────────────────────────────────────────────────────────────────
  # XDG gate — runs the xdg-audit REPO GATE against THIS checkout only
  # (cortex#2033). The self-test (scripts/__tests__/xdg-audit.test.ts) already
  # runs under the `test` job and proves the gate MECHANISM works; this job runs
  # the gate itself over the PR's tree so a stale-XDG-path regression can't land
  # the way it did in PR#2026 (2 gated findings + 9 dead allow-entries reached
  # main because the full scan ran only manually — b2030 had to clean it up).
  #
  # Scope is SELF-REPO ONLY: the positional root `.` REPLACES the tool's default
  # cross-repo roots (cortex/arc/metafactory-discord), so CI scans just the
  # cortex checkout. arc + metafactory-discord are not checked out here and
  # cross-repo state is not a cortex PR's fault — each repo enforces its own tree
  # in its own CI.
  #
  # Exit contract (verified in scripts/xdg-audit.ts): the exit code is the count
  # of GATED findings; unused/unknown allowlist ENTRIES are WARNINGS that do NOT
  # affect the exit code. On a cortex-only scan the shared allowlist's arc/discord
  # entries read "unused" by design (the cross-repo NOTE b2030 added documents
  # this) — so those warnings inform without failing the job. Only gated findings
  # in the PR's tree turn this red.
  # ──────────────────────────────────────────────────────────────────
  xdg-gate:
    name: XDG gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: xdg-audit --repos (self-repo scope)
        run: bun scripts/xdg-audit.ts --repos .

  # ──────────────────────────────────────────────────────────────────
  # systemd-e2e — systemd-user session capability for e2e jobs (cortex#2092).
  # Phase L1 of the Linux host support spec (arc design/linux-host-support.md,
  # arc#309) adds scripts/lib/systemd-render.sh to cortex; its e2e test needs
  # `systemctl --user` to work for real. cortex CI already runs entirely on
  # ubuntu-latest — this is NOT a new CI lane. The gap is narrower: a plain
  # GitHub Actions job has no systemd user session (no XDG_RUNTIME_DIR bus for
  # the runner user), so `systemctl --user` fails with "Failed to connect to
  # bus". This job enables lingering + waits for the user bus socket, exports
  # XDG_RUNTIME_DIR/DBUS_SESSION_BUS_ADDRESS via GITHUB_ENV, and runs a smoke
  # check plus a placeholder bun test filter (zero matching tests is green at
  # this stage — cortex#2071's L1 e2e test will populate the pattern).
  #
  # NON-REQUIRED for now: flipping this to a required check is a principal
  # decision, deferred until cortex#2071's e2e test lands (see issue #2092
  # "explicitly out of scope").
  # ──────────────────────────────────────────────────────────────────
  systemd-e2e:
    name: systemd e2e (systemd-user session)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Enable systemd user session
        run: |
          sudo loginctl enable-linger "$(whoami)"
          # Wait for the user manager + bus socket to come up (up to 15s):
          for i in $(seq 1 15); do
            [ -S "/run/user/$(id -u)/bus" ] && break; sleep 1
          done
          test -S "/run/user/$(id -u)/bus"
          echo "XDG_RUNTIME_DIR=/run/user/$(id -u)" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus" >> "$GITHUB_ENV"

      - name: Verify env exported
        run: env | grep -E "XDG_RUNTIME|DBUS"

      - name: Smoke systemctl --user
        run: systemctl --user status --no-pager || systemctl --user list-units --no-pager | head -5

      # `bun test --test-name-pattern` exits 1 on zero matches (verified locally),
      # which would make this job red until cortex#2071 adds a matching test —
      # contradicting the issue's own acceptance criterion that zero matches is
      # green at this stage. Guard on the "matched 0 tests" message so a real
      # test failure still fails the job once cortex#2071 lands.
      #
      # SYSTEMD_E2E=1 is this job's explicit opt-in for
      # scripts/__tests__/systemd-render-e2e.test.ts (cortex#2071) — that test
      # gates on this exact env var (not a broader "CI=true" or "Linux with a
      # systemd session" signal) precisely so it runs ONLY here and not in the
      # plain Test job, which has no systemd-user session bootstrap but still
      # satisfied a looser check (cortex#2103 review finding).
      - name: bun test (systemd-e2e)
        env:
          SYSTEMD_E2E: "1"
        run: |
          set +e
          output=$(bun test --test-name-pattern systemd-e2e 2>&1)
          status=$?
          echo "$output"
          if [ $status -ne 0 ] && echo "$output" | grep -q "matched 0 tests"; then
            echo "No systemd-e2e tests yet — zero matches is green per cortex#2092 (cortex#2071 will populate this pattern)."
            exit 0
          fi
          exit $status
