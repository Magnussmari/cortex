# ~/.config/cortex/agents.d/pier.yaml
#
# audience: generic
#
# Pier — onboarding-concierge assistant (ADR-0015, cortex#1142)
#
# This fragment ships in the PUBLIC arc package. It carries NO live deployment
# identifiers: the Discord bot token AND every guild/channel id are `__ENV__`
# placeholders resolved at cortex config-load from the daemon environment
# (compass#84 / confidentiality L2). Set the PIER_* env vars before install; an
# unset id/token fails SOFT — Pier's Discord surface is disabled, not a crash.
#
# This fragment is rendered by `arc install pier` into the installing
# principal's `~/.config/cortex/agents.d/pier.yaml`.  It MUST NOT be
# hand-edited on the target host — edits are overwritten on the next
# `arc upgrade pier`.  Edit the source in the pier package instead.
#
# Two axes governed here (per design-arc-agent-bots.md §2):
#   Identity  — id, displayName, trust
#   Presence  — discord bound to the metafactory community guild
#
# Substrate + capabilities are declared in arc-manifest-pier.yaml;
# the rendered fragment carries them so the cortex dashboard can
# render accurate provenance ("pier (in-process / claude-code)").

id: pier
displayName: Pier
persona: ~/.config/cortex/personas/pier.md
# `roles:` is intentionally absent — AgentSchema.roles[] was retired at the
# v2.0.0 cutover (cortex#297) and authorization now lives on policy.principals[].
# Pier's "issues nothing" boundary is enforced by its persona + the admission
# gate it can only *surface* (never approve); it mints no NATS credentials.
trust: [luna]

# cortex#1165 — open-onboarding gate. Pier is a concierge that must greet
# strangers: senders not (yet) mapped to any principal. With this flag set,
# such an unmapped sender is attributed to a ZERO-AUTHORITY anonymous principal
# (no roles, no privileged capability, every tool restricted, untrusted) so Pier's chat
# session can respond — instead of the strict "I'm not set up to respond to
# you" deny that every other agent keeps. Pier issues nothing, so the blast
# radius of admitting a stranger is "a reply in the public onboarding channel".
# The gate fires ONLY for non-DM messages on Pier's bound public channel
# (agentChannelId) — an unmapped DM stays denied.
openOnboarding: true
# cortex#1167 — explicit tool ALLOWLIST for the anonymous onboarding session.
# MUST mirror the persona allowedTools (personas/pier.md → [Read]). Anything not
# listed — every mcp__* tool, every future tool — is denied at the CC layer
# (the anon session must never get allow-by-default tool access).
openOnboardingAllowedTools: [Read]

# Substrate + mode persisted per design-arc-agent-bots.md §4 Q3.
runtime:
  substrate: claude-code
  mode: in-process
  capabilities:
    - onboarding            # drives Tier-1 and Tier-2 community onboarding
    - chat                  # responds to newcomer messages in #onboard-your-fleet

# Discord presence — bound to the metafactory community guild.
# Every identifier below is a resolve-at-install `__ENV__` placeholder; NO live
# token or snowflake is stored in this shippable fragment. All resolve at cortex
# config-load from the daemon environment (compass#84 / L2). An unset value fails
# SOFT — the Discord surface is disabled, the rest of the stack still boots.
#
# Three-channel topology (the public-entry / private-back-office split):
#   guildId        (__PIER_GUILD_ID__)         — the metafactory community guild
#   agentChannelId (__PIER_AGENT_CHANNEL_ID__) — the PUBLIC entry channel;
#                    newcomers must reach Pier here before they hold the
#                    community-fleet role
#   logChannelId   (__PIER_LOG_CHANNEL_ID__)   — the PRIVATE back-office channel;
#                    admission audit trail, principal + Pier only (never commit
#                    its literal id)
#
# env vars (set by the operator before arc install; see arc-manifest-pier.yaml):
#   PIER_BOT_TOKEN · PIER_GUILD_ID · PIER_AGENT_CHANNEL_ID · PIER_LOG_CHANNEL_ID
presence:
  discord:
    enabled: true
    token: __PIER_BOT_TOKEN__               # placeholder; resolved at cortex load
    guildId: __PIER_GUILD_ID__              # resolve-at-install; community guild
    agentChannelId: __PIER_AGENT_CHANNEL_ID__  # resolve-at-install; public entry
    logChannelId: __PIER_LOG_CHANNEL_ID__   # resolve-at-install; private back-office
    dmOwner: false                    # Pier never claims DMs; it answers the public channel
    contextDepth: 10
    surfaceSubjects: []               # no raw envelope surface — Pier posts only via its persona
