# ~/.config/cortex/agents.d/pylon.yaml
#
# Pylon — domain-language grilling concierge for the Northpower
# Asset Management Transformation (Maximo) programme (WEB-2, cortex#1312)
#
# This fragment is rendered by `arc install pylon` into the
# installing principal's `~/.config/cortex/agents.d/pylon.yaml`.
# It MUST NOT be hand-edited on the target host — edits are overwritten on
# the next `arc upgrade pylon`.  Edit the source in the pylon package instead.
#
# Two axes governed here (per design-arc-agent-bots.md §2):
#   Identity  — id, displayName, trust
#   Presence  — none (known-principal rooms only; no Discord binding here)
#
# Substrate + capabilities are declared in arc-manifest-pylon.yaml;
# the rendered fragment carries them so the cortex dashboard can render
# accurate provenance ("pylon (in-process / claude-code)").

id: pylon
displayName: Pylon
persona: ~/.config/cortex/personas/pylon.md
# `roles:` is intentionally absent — AgentSchema.roles[] was retired at the
# v2.0.0 cutover (cortex#297) and authorization now lives on policy.principals[].
trust: [luna]

# Known-principal rooms only — no openOnboarding needed.
# This agent is called from the AMT web surface (WEB-2); the principal (luna)
# dispatches to it via the work stack's policy.  Unmapped senders are already
# hard-blocked by the policy engine.

# Headless — no Discord binding. This agent is dispatched by the work stack's
# runner (via the AMT web surface, WEB-2). `presence: {}` is the required
# empty-presence declaration for a headless in-process agent (cortex#245).
presence: {}

# Substrate + mode persisted per design-arc-agent-bots.md §4 Q3.
runtime:
  substrate: claude-code
  mode: in-process
  capabilities:
    - grill                  # AMT grill-with-docs domain-language facilitation

# WEB-2 / B1 — structural tool confinement enforced at the dispatch layer.
#
# `agentDisallowedTools` is merged into effectiveDisallowed for EVERY CC session
# this agent runs (see dispatch-handler.ts). It is the authoritative enforcement
# point: policy-based tool-inversion (facilitator-role carries no `tool.*`
# capabilities, so all 14 CLAUDE_TOOL_INVENTORY tools are denied via
# toolRestrictions) covers known CC tools, but cannot deny MCP tools without
# --strict-mcp-config.
#
# This list mirrors grill.ts's explicit DENY list on the brain-call path and
# extends it with the full CLAUDE_TOOL_INVENTORY for belt-and-suspenders.
#
# `strictMcpConfig: true` adds --strict-mcp-config to the CC session argv,
# preventing the agent from inheriting MCP tools from the principal's
# ~/.claude/settings.json or any project-level CLAUDE.md.
agentDisallowedTools:
  - Bash
  - Edit
  - Write
  - NotebookEdit
  - Read
  - Glob
  - Grep
  - WebFetch
  - WebSearch
  - Task
  - Agent
  - Skill
  - ExitPlanMode
  - TodoWrite
  - BashOutput
  - KillShell
strictMcpConfig: true
