schema: blueprint/v1
repo: cortex
features:
  C-100:
    name: Cortex platform — migration from grove-v2 (umbrella)
    status: in-progress
    description: >
      Umbrella feature for the cortex spawn — moving from grove-v2 (and abandoning
      legacy grove) into the M7-application home for the metafactory ecosystem.
      See docs/plan-cortex-migration.md for the full per-phase plan.
    children:
      - C-101
      - C-102
      - C-103
      - C-104
      - C-105
      - C-106
      - C-107
      - C-108
      - C-109

  C-101:
    name: MIG-0 — Cortex repo bootstrap
    status: in-progress
    description: >
      Compass-core 7-step new-repo bootstrap. Creates the cortex repo, applies
      labels, lifts design + migration plan, files umbrella issue + per-phase
      issues. THIS phase is what's happening right now in cortex#2.
    parent: C-100
    issue: 2

  C-102:
    name: MIG-1 — Bus runtime (NATS + myelin + dispatch-handler + surface-router)
    status: planned
    description: >
      Lift the G-1100 ladder out of grove-v2's src/bot/lib/ into cortex/src/bus/.
      Includes new code for the surface-router (G-1111.A target).
    parent: C-100
    issue: 3
    depends_on: [C-101]

  C-103:
    name: MIG-2 — Surface (Mission Control v3 lifted)
    status: planned
    description: >
      Move src/mission-control/ + src/worker/ + dashboard-{api,state,db}.ts
      into cortex/src/surface/mc/. Retire legacy src/dashboard/ (mc-v2).
    parent: C-100
    issue: 4
    depends_on: [C-101]
    parallelizable: true

  C-104:
    name: MIG-3 — Adapters (Discord, Mattermost via surface-router)
    status: planned
    description: >
      Move src/bot/lib/adapters/ + Discord client + response-poster into
      cortex/src/adapters/. Refactor to register with surface-router instead
      of subscribing to NATS directly. Wire system.adapter.* + system.dispatch.*
      events.
    parent: C-100
    issue: 5
    depends_on: [C-102]

  C-105:
    name: MIG-4 — Runner (CC orchestration via bus)
    status: planned
    description: >
      Move cc-session + session-manager + stream-parser + agent-team +
      worklog-manager etc. into cortex/src/runner/. Refactor to subscribe
      to dispatch.task.received via surface-router; emit lifecycle envelopes.
    parent: C-100
    issue: 6
    depends_on: [C-102, C-104]

  C-106:
    name: MIG-5 — Taps (GH webhook + CC events)
    status: in-progress
    description: >
      Move src/relay/ + src/hooks/ + src/webhook-proxy/ + cloud-publisher
      into cortex/src/taps/. Update CC hooks to publish CloudEvents to NATS
      via MyelinRuntime. MIG-5a (5.1, 5.2, 5.4, 5.7) merged in cortex#17.
      MIG-5b (5.3 cloud-publisher lift, 5.5 relay-side bus publishing)
      lands in this PR. 5.6 (gh-webhook → NATS) deferred — folded into
      MIG-7 wiring per architectural note in docs/plan-cortex-migration.md.
    parent: C-100
    issue: 7
    depends_on: [C-102]
    parallelizable: true

  C-107:
    name: MIG-6 — Operator CLIs (discord, cldyo-live)
    status: planned
    description: >
      Move src/cli/discord.ts + src/cli/cldyo-live (single bash script)
      into cortex/src/cli/. Update arc-manifest provides:.
    parent: C-100
    issue: 8
    depends_on: [C-101]

  C-108:
    name: MIG-7 — Top-level wiring + arc package switchover
    status: planned
    description: >
      Create cortex/src/cortex.ts entrypoint. Refactor config schema to first-class
      agents[] + renderers[] (agent-bundle flip per design §9). Migration helper
      for grove-v2 bot.yaml → cortex.yaml. Rename launchd plist + config path.
      Bump version to v1.0.0 (per §6.3 lean) at cutover.
    parent: C-100
    issue: 9
    depends_on: [C-103, C-104, C-105, C-106, C-107]

  C-109:
    name: MIG-8 — Retire grove + grove-v2
    status: planned
    description: >
      Verify cortex in production ≥1 week. Archive legacy grove + grove-v2.
      Remove deprecation shims. Update sibling-repo references from grove:G-NNN
      to cortex:C-NNN. Final cleanup.
    parent: C-100
    issue: 10
    depends_on: [C-108]

  I-100:
    name: Internet of Agentic Work (umbrella META)
    status: in-progress
    description: >
      Operator-facing umbrella for the Internet of Agentic Work — the composition
      model where stacks ({operator_id}/{stack_id}) join networks via NATS leaf-node
      federation; networks compose into the operator's federated graph; agents
      delegate across stacks and networks via the orchestrator pattern. Five
      implementation phases (A–E) deliver this incrementally. See
      docs/design-internet-of-agentic-work.md (synthesis) and
      docs/plan-internet-of-agentic-work.md (implementation plan).
    issue: 110
    children:
      - I-101
      - I-102
      - I-103
      - I-104
      - I-105
      - I-106
    depends_on: [C-108]

  I-101:
    name: IAW Phase A — Foundation (substrate harness + visibility + stack identity)
    status: planned
    description: >
      Land cortex#91 SessionHarness interface + ClaudeCodeHarness + BusPeerHarness;
      bump vendored myelin envelope past 96b14ea (chain-of-stamps + F-021 task
      fields); parameterise classification at the four hardcoded emit sites; add
      surface-router visibility filter; add cortex.yaml stack: block (Q7 lock-in)
      and capabilities: block (Q2 lock-in). Phase A.5 coordinates with myelin on
      the {stack} segment namespace extension.
    parent: I-100
    issue: 113
    depends_on: [C-108]

  I-102:
    name: IAW Phase B — Identity (NKey-signed bot↔bot)
    status: planned
    description: >
      Consume cortex#102 — BusPeerHarness verifies signed_by[] on every inbound
      dispatch via TrustResolver.trustsByNKey(); ClaudeCodeHarness uses
      MyelinRuntime.publish for bot-bot calls. Discord-platform-ID trust retires
      for bot↔bot paths; stays for human-to-bot DMs.
    parent: I-100
    issue: 114
    depends_on: [I-101]

  I-103:
    name: IAW Phase C — Policy + schema flip (PolicyEngine at M6)
    status: planned
    description: >
      Land cortex#107 PolicyEngine at M6; the one and only cortex.yaml schema
      flip from per-adapter roles[] to top-level policy:{ principals[], roles[] }.
      principals[] carries home_operator + home_stack per Q1 lock-in. Audit
      envelopes (system.access.{allowed,denied}) per cortex#97 integration.
    parent: I-100
    issue: 115
    depends_on: [I-101, I-102]

  I-104:
    name: IAW Phase D — Federation (multi-operator + cloud-side network registry)
    status: planned
    description: >
      Consume cortex#107 Step H multi-operator dashboard + cortex#109 §E peer
      registry. policy.federated.networks[] schema lands; surface-router gates
      inbound federated.* by per-peer accept rules; cloud-side network registry
      service deployed alongside the dashboard (Q3 lock-in: centralised, NOT
      gossiped). Two-operator integration test demonstrates federated task
      with verifiable chain-of-stamps.
    parent: I-100
    issue: 116
    depends_on: [I-103]

  I-105:
    name: IAW Phase E — Multi-network bridges + delegation
    status: planned
    description: >
      Multi-link MyelinRuntime supports N concurrent NATS leaf-nodes (one per
      network membership per Q4 lock-in). Orchestrator agent reference
      implementation delegates across networks via chain-of-stamps. Mesh
      varieties (private/isolated-private/bridge) documented and operable.
      Phase E delivers the §3.6 delegation pattern from the design doc.
    parent: I-100
    issue: 117
    depends_on: [I-104]

  I-106:
    name: IAW Phase C cleanup — v2.0.0 policy cutover
    status: in-progress
    description: >
      Retire legacy per-adapter roles[] from Discord/Mattermost/Slack
      PresenceSchemas. Top-level policy:{principals[], roles[]} becomes the
      single source of truth for authorization. PolicyEngine (shipped in C.1)
      becomes the sole decision point; adapters thin to lookup-and-call.
      Operator migration via extended migrate-config CLI. Design ratified in
      PR #291 (docs/design-policy-cutover.md); iteration plan in PR #292
      (docs/iteration-policy-cutover.md). 5-PR sequence — 243a + 243b
      parallelisable, then 243c, with 242a in parallel after 243a, finishing
      with 242b at v2.0.0.
    parent: I-100
    children:
      - I-243A
      - I-243B
      - I-243C
      - I-242A
      - I-242B
    depends_on: [I-103]

  I-243A:
    name: cortex#293 — PolicyPrincipal schema extension (243a)
    status: planned
    description: >
      Additive schema extension. Adds platform_ids (open Record<platform_name,
      string[]> — NOT closed enum), session_config {default, dm?} split,
      principal-id uniqueness scoped to (id, home_stack), (platform_name,
      platform_id) tuple uniqueness, federation-peer convention JSDoc.
      ~150 LOC + tests. Schema-only — no consumer changes, no migration.
    parent: I-106
    issue: 293

  I-243B:
    name: cortex#294 — Canonical Claude tool inventory (243b)
    status: planned
    description: >
      New file src/common/policy/tool-inventory.ts. Exports
      CLAUDE_TOOL_INVENTORY, invertDisallowedTools(), toolCapability().
      ~50 LOC + tests. Independent of I-243A — can ship in parallel.
    parent: I-106
    issue: 294

  I-243C:
    name: cortex#295 — migrate-config CLI extension (243c)
    status: planned
    description: >
      Reads legacy per-adapter roles[], unifies per-user across adapter
      copies, emits top-level policy.principals[] + policy.roles[] with
      namespaced capabilities. Synthesises anonymous-per-instance principals
      for defaultRole; operator principal with session_config.dm split;
      external-peer principals with home_operator=unknown placeholders.
      NEW --check mode = 242a operator pre-flight gate. Idempotent. SOP +
      migration examples. ~400 LOC + tests + docs. Biggest slice.
    parent: I-106
    issue: 295
    depends_on: [I-243A, I-243B]

  I-242A:
    name: cortex#296 — Adapter PolicyEngine wiring (parallel mode, 242a)
    status: planned
    description: >
      Wires PolicyEngine alongside legacy role-resolver in Discord/
      Mattermost/Slack adapters. Effective decision = most-restrictive
      intersection (security default — NOT new-system-wins). New
      system.access.disagreement envelope for dashboard visibility. New
      cortex.yaml flag policy.parallel_mode_enabled (default off; operator
      opts in AFTER migrate-config --check passes). ~250 LOC + tests.
      Depends only on schema (I-243A) — parallel mode runs against legacy
      configs.
    parent: I-106
    issue: 296
    depends_on: [I-243A]

  I-242B:
    name: cortex#297 — Legacy roles[] removal + v2.0.0 bump (242b)
    status: planned
    description: >
      The breaking removal. Drops per-adapter roles[] + defaultRole +
      DMConfigSchema + AgentSchema.operatorDiscordId/Mattermost/Slack +
      AgentSchema.roles[]. Retains agents[].trust[] (adapter-level bus-trust,
      distinct from policy.principals[].trust[]). Deletes role-resolver.ts.
      Strict-mode parse error on legacy configs. arc-manifest.yaml → v2.0.0.
      ~300 LOC removed + ~30 tests updated. Depends on CLI (I-243C — operators
      have migration path) AND parallel-mode validation (I-242A — zero
      disagreement envelopes for ≥24h).
    parent: I-106
    issue: 297
    depends_on: [I-243C, I-242A]


  # ─────────────────────────────────────────────────────────────────────────
  # R-237 — Capability-dispatch review consumer (cortex#237)
  # 9-PR cluster per docs/design-capability-dispatch-review-consumer.md §10.1.
  # 8/9 PRs MERGED: #273 PR-1, #283 PR-2, #284 PR-3, #285 PR-4, #287 PR-5,
  # #288 PR-7, #289 PR-8b, #290 PR-6 (integration gate).
  # Remaining: PR-9 e2e rig with §11.1 Layer 2 round-trip.
  # ─────────────────────────────────────────────────────────────────────────

  R-237:
    name: Capability-dispatch review consumer (cortex#237 cluster)
    status: in-progress
    description: >
      Path A consumer landing Echo on `tasks.code-review.<flavor>` via MyelinSubscriber
      pull mode; emits `review.verdict.{approved,changes-requested,commented}` +
      `dispatch.task.failed` per cortex#249 nak taxonomy. See
      docs/design-capability-dispatch-review-consumer.md §10.1 for PR phasing.
      8/9 PRs MERGED. PR-9 e2e rig remains.
    issue: 237
    children: [R-237.9, R-237-followup-288, R-237-followup-214]
    depends_on: [I-101]

  R-237.9:
    name: cortex#237 PR-9 — e2e test rig (§11.1 Layer 2 round-trip)
    status: in-progress
    description: >
      Stub-NATS e2e rig per design spec §11.1 Layer 2. Closes the cortex#237
      cluster on merge.
    parent: R-237

  R-237-followup-288:
    name: cortex#288 follow-up — boot-log accuracy + ConfigWatcher TODO
    status: in-progress
    description: >
      Architect non-blocking observations from cortex#288 review: boot-log
      overcount on swallowed failures + missing inline TODO at ConfigWatcher
      callback site.
    parent: R-237

  R-237-followup-214:
    name: Verify cortex#214 — Echo review pipeline drops via #collaboration
    status: planned
    description: >
      Pre-cortex#237 issue; cortex#290 supersedes the silent-drop path with
      typed dispatch.task.failed envelopes. Verify in P-VERIFY window.
    parent: R-237
    issue: 214

  W3-CUTOVER:
    name: Wave 3 cutover — capability-dispatch path becomes default
    status: in-progress
    description: >
      Phase C of docs/design-pilot-restructure.md. Flips Echo + pilot from
      Discord-mention review loop to bus-native capability dispatch.
    children: [W3-CUTOVER.C3]
    depends_on: [R-237]

  W3-CUTOVER.C3:
    name: Wave 3 C.3 — cortex docs cutover-complete (cortex#271)
    status: done
    description: >
      Flipped 6 rows in docs/design-pilot-restructure.md §4 maturity tables.
    parent: W3-CUTOVER
    issue: 271

  W4-RETIRE:
    name: Wave 4 — pilot legacy retirement + arc-manifest v1.0.0
    status: planned
    description: >
      Pilot bus/legacy + mention-dispatch + Discord retirement, concluding
      with pilot v1.0.0. Sub-features on pilot:P-D1..P-D4.
    depends_on: [W3-CUTOVER]

  G-1113:
    name: Mission Control Cortex Cockpit (umbrella)
    status: in-progress
    description: >
      Re-ground Mission Control as the operator cockpit for a Cortex stack.
      Provider-neutral source refs, first-class Git objects, plan lineage UI,
      attention queue. See docs/design-mission-control-cortex-cockpit.md and
      docs/plan-mission-control-cockpit.md.
    children: [G-1113.A, G-1113.B, G-1113.C, G-1113.D, G-1113.E]

  G-1113.A:
    name: Phase A — Grounding
    status: planned
    description: >
      Land plan + design doc on main, fix dashboard build-script path drift,
      add Mission Control glossary, annotate genuinely-misleading lifted
      grove-v2 design docs as historical. Sub-features filed pre-emptively
      because Phase A is a single PR.
    parent: G-1113
    children: [G-1113.A.1]

  G-1113.A.1:
    name: Grounding PR — plan + design + script-fix + glossary + historical banners
    status: planned
    description: >
      Single PR landing docs/plan-mission-control-cockpit.md (already drafted),
      fixing package.json build:dashboard + watch:dashboard paths from
      src/mission-control/dashboard-v2 to src/surface/mc/dashboard-v2, adding
      docs/glossary-mission-control.md, and applying a standard "Historical —
      lifted from grove-v2" banner to ~12 lifted MC design docs.
    parent: G-1113.A

  G-1113.B:
    name: Phase B — Provider-Neutral Source Refs
    status: planned
    description: >
      Introduce normalized SourceRef model + Provider enum
      (internal/github/gitlab/azure-devops/jira/linear/bitbucket/custom).
      Move GitHub URL parsing + webhook ingestion + REST fetch behind an
      adapters/github/ boundary. Keep existing GitHub behavior working. No
      new providers wired; fixture-only tests for GitLab/Azure DevOps/Jira/
      internal. Sub-features G-1113.B.{1..4} filed at phase start.
    parent: G-1113
    depends_on: [G-1113.A]

  G-1113.C:
    name: Phase C — Software Mode Domain Model
    status: planned
    description: >
      First-class Git object types in the model layer: repository, branch,
      commit, tag, release, pull request, review, check/build, deployment,
      artifact. Provider-native labels preserved via providerNativeType.
      GitHub adapter populates the model from existing webhook + REST data.
      Software-mode UI flag gates the new Git-object rows. Sub-features
      G-1113.C.{1..6} filed at phase start.
    parent: G-1113
    depends_on: [G-1113.B]

  G-1113.D:
    name: Phase D — Plan Lineage UI
    status: planned
    description: >
      Plan + PlanPhase types and storage. Plan ingestion parses repo-local
      plan/iteration markdown into Plan rows. Plan overview surface rolls up
      phase, work item, PR, session, and attention state. Recasts the existing
      Iterations tab (compatibility kanban retained until parity).
      Sub-features G-1113.D.{1..6} filed at phase start. Benefits from C but
      blocks on B only for the model layer.
    parent: G-1113
    depends_on: [G-1113.B]

  G-1113.E:
    name: Phase E — Attention + Notifications
    status: planned
    description: >
      One attention queue across plans, phases, work items, PRs, sessions.
      AttentionItem type + storage + lifecycle. Wires sources: blocked
      sessions, permission requests, review checkpoints, failed dispatches,
      failing checks, stale work. Notification routing via system.attention.*
      envelopes rendered by Discord/Slack/Mattermost adapters. Sub-features
      G-1113.E.{1..4} filed at phase start.
    parent: G-1113
    depends_on: [G-1113.C, G-1113.D]
