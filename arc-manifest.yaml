# arc-manifest.yaml -- cortex
# See: https://github.com/the-metafactory/arc

name: "cortex"
# v4.0.0 BREAKING (cortex#436 R2.I/R2.G/R3) — the legacy principal-identity
# config keys are no longer accepted: the top-level `operator:` block, the cloud
# `operatorId` key, and the federated-peer `operator_id` / `operator_pubkey` keys
# now fail to load (strict canonical-only schemas). Run `cortex migrate-config`
# to rewrite a pre-v4 config to the canonical `principal:` / `principalId` /
# `principal_id` shape.
version: "6.8.3"
type: component
tier: community
description: "Layer-7 collaboration surface for the metafactory ecosystem — the M7 application that consumes the Myelin layer model"
authors:
  - "Andreas Astrom"
  - "Jens-Christian Fischer"
repository: "the-metafactory/cortex"

# Provides surface at MIG-7.7 cutover: bot binary + relay + operator CLIs +
# hooks + launchd plists. Mirrors grove-v2's deliverables under cortex names.
#
# Pre-flight (operator step before `arc upgrade cortex`):
#   - `arc list | grep -i grove` must return nothing. The legacy grove
#     manifest owns the `~/bin/grove-bot` and `~/bin/grove-relay` symlinks
#     and `com.grove.bot` / `com.grove.relay` plists; `arc upgrade cortex`
#     does NOT touch them while grove is installed. Sequence:
#       1. `arc uninstall Grove` (legacy)
#       2. `arc upgrade cortex`
#       3. Verify `~/.local/bin/cortex` resolves and `~/bin/grove-bot` is gone.
#
# Deprecation shim (separate manual step, not part of this manifest):
#   - Install `scripts/grove-bot-shim.sh` as `~/bin/grove-bot`. It prints
#     "use cortex instead" and execs `~/.local/bin/cortex "$@"`. Operator can keep
#     this in place during cutover so old aliases keep working. Removed in
#     MIG-8.4.
#
# Rollback (idempotent): `arc uninstall cortex` + `arc upgrade Grove`
# reinstalls legacy at v0.29.0.
provides:
  files:
    # ─── Bot + relay binaries ─────────────────────────────────
    - source: src/cortex.ts
      target: ~/.local/bin/cortex
    - source: src/taps/cc-events/relay.ts
      target: ~/.local/bin/cortex-relay

    # ─── Operator CLIs (carried forward from MIG-6) ──────────
    # The Discord CLI + its wrapping skill (formerly src/cli/discord/discord.ts →
    # ~/bin/discord and src/cli/discord/skill → ~/.claude/skills/Discord) were
    # EXTRACTED to the `metafactory-bundle-discord` arc bundle (ADR-0017, epic #1171
    # S1/S2). The bundle now provides ~/bin/discord and the Discord skill;
    # cortex declares it under `dependencies:` below (this is the CLI +
    # skill, ADR-0017 — unaffected). The live Discord ADAPTER itself later
    # extracted SEPARATELY (cortex#1797 S12, ADR-0024) to the
    # `metafactory-cortex-adapter-discord` bundle, also declared below —
    # `src/adapters/discord/` no longer exists in-tree.
    - source: src/cli/cldyo-live
      target: ~/.local/bin/cldyo-live

    # ─── Claude Code hooks ────────────────────────────────────
    # Hook source filenames are kebab-case (event-logger.hook.ts,
    # surface-context.hook.ts, bash-guard.hook.ts) matching repo convention.
    # The installed symlink targets ARE renamed to Cortex* so settings.json
    # references are cortex-side and don't collide with grove leftovers.
    # NOTE: each `source` below MUST match the actual filename in
    # src/taps/cc-events/hooks/ — rename the file and update this path in
    # the SAME commit, or arc recreates a dangling symlink at the target
    # (the cause of the CortexContext breakage this entry fixes).
    - source: src/taps/cc-events/hooks/surface-context.hook.ts
      target: ~/.claude/hooks/CortexContext.hook.ts
    - source: src/taps/cc-events/hooks/event-logger.hook.ts
      target: ~/.claude/hooks/CortexEventLogger.hook.ts
    - source: src/runner/hooks/bash-guard.hook.ts
      target: ~/.claude/hooks/CortexBashGuard.hook.ts
    # cortex#710 (C-701 Part B) — per-skill grant PreToolUse hook. Installed
    # as a symlink ONLY (no `hooks:` entry below) so it is NEVER registered in
    # the principal's GLOBAL settings.json — it would otherwise gate the
    # principal's own Skill invocations. It is registered PER-SESSION in the
    # curated `--settings` file (session-settings.ts) for bot sessions that
    # carry skill grants. The symlink must exist so that curated file can
    # reference the installed absolute path.
    - source: src/runner/hooks/skill-guard.hook.ts
      target: ~/.claude/hooks/CortexSkillGuard.hook.ts
    # cortex#1676: deliberately NO `hooks/lib` symlink under ~/.claude. Hook
    # files import their lib modules with paths relative to their own file
    # (e.g. `./lib/...`, or `../../taps/cc-events/hooks/lib/...` for
    # bash-guard.hook.ts, which lives outside src/taps/cc-events/hooks/).
    # Bun/Node resolve relative imports against the REALPATH of the
    # importing module (symlinks resolved, no --preserve-symlinks), so those
    # imports reach directly into this repo's checkout — nothing ever
    # resolves through an installed lib link. The `~/.claude/hooks/lib/`
    # symlink this manifest used to declare (pointing at this same source
    # dir) was vestigial dead weight (Vincent's fresh-install feedback,
    # 8 Jul 2026 thread).

    # ─── Relay policy directory ───────────────────────────────
    - source: src/taps/cc-events
      target: ~/.claude/relay/cortex

    # ─── Status line (cortex#96) ──────────────────────────────
    # Cortex inherits grove's statusline role. The main script falls
    # back gracefully when PAI_DIR or its caches are absent, so the
    # statusline keeps rendering on hosts without PAI installed.
    - source: src/statusline/statusline-command.sh
      target: ~/.claude/statusline-command.sh
    - source: src/statusline/cortex-status.sh
      target: ~/.claude/cortex-status.sh

  hooks:
    - event: SessionStart
      command: ${PAI_DIR}/hooks/CortexContext.hook.ts
    - event: PostToolUse
      command: ${PAI_DIR}/hooks/CortexEventLogger.hook.ts
    - event: Stop
      command: ${PAI_DIR}/hooks/CortexEventLogger.hook.ts
    - event: UserPromptSubmit
      command: ${PAI_DIR}/hooks/CortexEventLogger.hook.ts
    - event: PreToolUse
      command: ${PAI_DIR}/hooks/CortexBashGuard.hook.ts
      matcher: Bash

# Lifecycle scripts (mirror grove-v2 three-stage pattern):
#   - preupgrade.sh  — stop daemons + clean stale symlinks before swap
#   - postinstall.sh — first-time install: runtime dirs + plist render +
#                      config template check (does NOT clobber existing
#                      ~/.config/cortex/cortex.yaml — operator runs
#                      migrate-config separately per MIG-7.9)
#   - postupgrade.sh — re-link binaries + re-template plists + restart
#
# Top-level key is `scripts:` (not `hooks:`) — same shape grove-v2 has used
# in production since at least v0.22.x (see
# `the-metafactory/grove-v2/arc-manifest.yaml`). The pre-MIG-7 cortex
# manifest carried a `hooks: { postupgrade: … }` shorthand from the
# MIG-6 bootstrap that didn't match arc's schema; this PR aligns with
# arc's actual schema as exercised by grove-v2's working installs.
# (Holly cortex#52 round 2 warning.)
scripts:
  postinstall: ./scripts/postinstall.sh
  preupgrade: ./scripts/preupgrade.sh
  postupgrade: ./scripts/postupgrade.sh

# Dependencies — cortex#79 pins arc >= 0.25.0. That's the release that
# ships the stable `arc.nats.v1` JSON contract on the four `arc nats *`
# commands (per arc#134, closes arc#131). `cortex creds issue/revoke/rotate`
# shell out to `arc nats …  --json`; without that contract the CLI's
# parse layer would have to fall back to scraping human-readable stdout.
# See docs/design-arc-agent-bots.md §6.3 for the full delegation model.
dependencies:
  - name: "arc"
    version: ">=0.25.0"
  # metafactory-bundle-discord (ADR-0017, epic #1171): the Discord CLI + skills were
  # extracted out of cortex into this standalone arc bundle. It provides
  # ~/bin/discord and the Discord skill that the cortex repo used to ship from
  # src/cli/discord/. Cortex consumes it as a dependency; the live Discord
  # adapter (src/adapters/discord/) stays in cortex.
  #
  # Distribution is repo-first (ADR-0017): the bundle is `arc install`-able from
  # the the-metafactory/metafactory-bundle-discord repo. Registry auto-resolution of
  # this package dep on `arc install cortex` is PENDING — until arc resolves it,
  # the bundle is installed explicitly and this declaration records the intent.
  - name: "metafactory-bundle-discord"
    version: ">=0.1.0"
  # metafactory-cortex-adapter-web (cortex#1794 S9, ADR-0024 D2): the web/SSE
  # surface adapter (C-110) extracted out of cortex core into this bundle —
  # `src/adapters/web/` is deleted in-tree, no fallback copy. `arc upgrade
  # cortex` auto-installs it; cortex's plugin loader
  # (src/adapters/loader.ts, cortex#1794 S9a) recognizes this exact NAME as
  # matching the compass#115 `metafactory-cortex-adapter-<name>` naming
  # standard (ADAPTER_BUNDLE_DEP_NAME_RE) and grants it the first-party
  # ADAPTER exemption from the default-off `system.plugins.external` flag —
  # so a stack upgrades transparently: the bundle installs, the adapter
  # loads, `surfaces.web[]` keeps working, and no principal ever has to flip
  # the flag for a repackage that only relocated cortex's own code.
  # Distribution is repo-first (ADR-0017):
  # https://github.com/the-metafactory/metafactory-cortex-adapter-web.
  - name: "metafactory-cortex-adapter-web"
    version: ">=0.1.0"
  # metafactory-cortex-adapter-slack (cortex#1795 S10, ADR-0024 D2): the
  # Slack surface adapter extracted out of cortex core into this bundle —
  # `src/adapters/slack/` is deleted in-tree, no fallback copy. `arc upgrade
  # cortex` auto-installs it; cortex's plugin loader
  # (src/adapters/loader.ts, cortex#1794 S9a) recognizes this exact NAME as
  # matching the compass#115 `metafactory-cortex-adapter-<name>` naming
  # standard (ADAPTER_BUNDLE_DEP_NAME_RE) and grants it the first-party
  # ADAPTER exemption from the default-off `system.plugins.external` flag —
  # so a stack upgrades transparently: the bundle installs, the adapter
  # loads, `surfaces.slack[]` keeps working, and no principal ever has to
  # flip the flag for a repackage that only relocated cortex's own code.
  # Distribution is repo-first (ADR-0017):
  # https://github.com/the-metafactory/metafactory-cortex-adapter-slack.
  - name: "metafactory-cortex-adapter-slack"
    version: ">=0.1.0"
  # metafactory-cortex-adapter-mattermost (cortex#1796 S11, ADR-0024 D5
  # extraction lane): the Mattermost surface adapter extracted out of
  # cortex core into this bundle — `src/adapters/mattermost/` is deleted
  # in-tree, no fallback copy. `arc upgrade cortex` auto-installs it;
  # cortex's plugin loader (src/adapters/loader.ts, cortex#1794 S9a)
  # recognizes this exact NAME as matching the compass#115
  # `metafactory-cortex-adapter-<name>` naming standard
  # (ADAPTER_BUNDLE_DEP_NAME_RE) and grants it the first-party ADAPTER
  # exemption from the default-off `system.plugins.external` flag — so a
  # stack upgrades transparently: the bundle installs, the adapter loads,
  # `surfaces.mattermost[]` / inline `agents[].presence.mattermost` keep
  # working, and no principal ever has to flip the flag for a repackage
  # that only relocated cortex's own code.
  # Distribution is repo-first (ADR-0017):
  # https://github.com/the-metafactory/metafactory-cortex-adapter-mattermost.
  - name: "metafactory-cortex-adapter-mattermost"
    version: ">=0.1.0"
  # metafactory-cortex-adapter-discord (cortex#1797 S12, ADR-0024 D5
  # extraction lane): the Discord surface adapter extracted out of cortex
  # core into this bundle — `src/adapters/discord/` is deleted in-tree, no
  # fallback copy. This is the FOURTH and FINAL in-tree adapter to extract;
  # `createDefaultSurfacePluginRegistry()` now registers ZERO in-tree
  # adapters. `arc upgrade cortex` auto-installs it; cortex's plugin loader
  # (src/adapters/loader.ts, cortex#1794 S9a) recognizes this exact NAME as
  # matching the compass#115 `metafactory-cortex-adapter-<name>` naming
  # standard (ADAPTER_BUNDLE_DEP_NAME_RE) and grants it the first-party
  # ADAPTER exemption from the default-off `system.plugins.external` flag —
  # so a stack upgrades transparently: the bundle installs, the adapter
  # loads, `surfaces.discord[]` / inline `agents[].presence.discord` keep
  # working, and no principal ever has to flip the flag for a repackage
  # that only relocated cortex's own code.
  # Distribution is repo-first (ADR-0017):
  # https://github.com/the-metafactory/metafactory-cortex-adapter-discord.
  - name: "metafactory-cortex-adapter-discord"
    version: ">=0.1.0"
  # metafactory-cortex-renderer-pagerduty (cortex#1894 S12b, ADR-0024 D5
  # extraction lane): the PagerDuty renderer extracted out of cortex core into
  # this bundle — the FIRST renderer-class extraction (the four adapters left
  # first). `src/renderers/pagerduty.ts` is deleted in-tree, no fallback copy;
  # `dashboard` STAYS in-tree permanently (OQ8 anchor). `arc upgrade cortex`
  # auto-installs it; cortex's plugin loader (src/adapters/loader.ts,
  # cortex#1894) recognizes this exact NAME as matching the compass#115
  # `metafactory-cortex-renderer-<name>` naming standard
  # (RENDERER_BUNDLE_DEP_NAME_RE) and grants it the first-party RENDERER
  # exemption from the default-off `system.plugins.external` flag — the
  # renderer twin of the S9a adapter exemption. So a stack upgrades
  # transparently: the bundle installs, the renderer loads, `renderers:
  # [pagerduty]` keeps working, and no principal ever has to flip the flag for
  # a repackage that only relocated cortex's own code. This declaration is ALSO
  # what makes the #1893 boot-coverage guard's install-state branch correct: a
  # stack with `renderers: [pagerduty]` but the bundle absent hard-fails naming
  # THIS bundle + `arc install`, rather than the pager silently not paging.
  # Distribution is repo-first (ADR-0017):
  # https://github.com/the-metafactory/metafactory-cortex-renderer-pagerduty.
  - name: "metafactory-cortex-renderer-pagerduty"
    version: ">=0.1.0"

# depends_on.packages — the arc AUTO-INSTALL contract (cortex#2028).
#
# WHY THIS EXISTS SEPARATELY FROM `dependencies:` ABOVE. cortex's own dep
# graph is read by TWO consumers that key off DIFFERENT fields:
#
#   1. cortex's plugin loader (src/adapters/loader.ts,
#      readCortexDeclaredAdapterRepos / readCortexDeclaredRendererRepos) reads
#      the TOP-LEVEL `dependencies:` array BY NAME to compute the first-party
#      load exemption. It derives each repo URL from the dependency NAME
#      (github.com/the-metafactory/<name>) and never looks at a `repo:` field.
#      → the `dependencies:` block above is authoritative for that path and is
#        left exactly as-is.
#
#   2. arc's installer (arc/src/commands/install.ts) reads `depends_on.packages`
#      (PackageDependency = { name, repo }) to CLONE + install each dependency
#      when you run `arc install cortex` / `arc upgrade cortex`. It IGNORES the
#      top-level `dependencies:` key entirely (ArcManifest has no such field),
#      and SKIPS any package with no `repo:`.
#      → this block is authoritative for that path.
#
# Before cortex#2028 only (1) existed, so arc auto-installed NONE of the five
# first-party surface-plugin bundles — the "arc auto-installs first-party
# bundles" story (release notes v6.8.0, sop-stack-onboarding.md) was untrue.
# Declaring the SAME five bundles here (name + repo) closes that gap. The two
# blocks list the same bundles by design; keep them in sync when a bundle is
# added or removed. `arc` (no repo) and metafactory-bundle-discord (ADR-0017
# CLI bundle) stay in `dependencies:` only — out of scope for this auto-install
# lane.
depends_on:
  packages:
    - name: "metafactory-cortex-adapter-web"
      repo: "https://github.com/the-metafactory/metafactory-cortex-adapter-web"
    - name: "metafactory-cortex-adapter-slack"
      repo: "https://github.com/the-metafactory/metafactory-cortex-adapter-slack"
    - name: "metafactory-cortex-adapter-mattermost"
      repo: "https://github.com/the-metafactory/metafactory-cortex-adapter-mattermost"
    - name: "metafactory-cortex-adapter-discord"
      repo: "https://github.com/the-metafactory/metafactory-cortex-adapter-discord"
    - name: "metafactory-cortex-renderer-pagerduty"
      repo: "https://github.com/the-metafactory/metafactory-cortex-renderer-pagerduty"

