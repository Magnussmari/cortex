# arc-manifest.yaml -- cortex
# See: https://github.com/the-metafactory/arc

name: "Cortex"
# v4.0.0 BREAKING (cortex#436 R2.I/R2.G/R3) — the legacy principal-identity
# config keys are no longer accepted: the top-level `operator:` block, the cloud
# `operatorId` key, and the federated-peer `operator_id` / `operator_pubkey` keys
# now fail to load (strict canonical-only schemas). Run `cortex migrate-config`
# to rewrite a pre-v4 config to the canonical `principal:` / `principalId` /
# `principal_id` shape.
version: "5.3.1"
type: component
tier: community
description: "Layer-7 collaboration surface for the metafactory ecosystem — the M7 application that consumes the Myelin stack"
authors:
  - "Andreas Astrom"
  - "Jens-Christian Fischer"
repository: "the-metafactory/cortex"

# Provides surface at MIG-7.7 cutover: bot binary + relay + operator CLIs +
# hooks + launchd plists. Mirrors grove-v2's deliverables under cortex names.
#
# Pre-flight (operator step before `arc upgrade Cortex`):
#   - `arc list | grep -i grove` must return nothing. The legacy grove
#     manifest owns the `~/bin/grove-bot` and `~/bin/grove-relay` symlinks
#     and `com.grove.bot` / `com.grove.relay` plists; `arc upgrade Cortex`
#     does NOT touch them while grove is installed. Sequence:
#       1. `arc uninstall Grove` (legacy)
#       2. `arc upgrade Cortex`
#       3. Verify `~/bin/cortex` resolves and `~/bin/grove-bot` is gone.
#
# Deprecation shim (separate manual step, not part of this manifest):
#   - Install `scripts/grove-bot-shim.sh` as `~/bin/grove-bot`. It prints
#     "use cortex instead" and execs `~/bin/cortex "$@"`. Operator can keep
#     this in place during cutover so old aliases keep working. Removed in
#     MIG-8.4.
#
# Rollback (idempotent): `arc uninstall Cortex` + `arc upgrade Grove`
# reinstalls legacy at v0.29.0.
provides:
  files:
    # ─── Bot + relay binaries ─────────────────────────────────
    - source: src/cortex.ts
      target: ~/bin/cortex
    - source: src/taps/cc-events/relay.ts
      target: ~/bin/cortex-relay

    # ─── Operator CLIs (carried forward from MIG-6) ──────────
    - source: src/cli/discord/discord.ts
      target: ~/bin/discord
    - source: src/cli/cldyo-live
      target: ~/bin/cldyo-live
    - source: src/cli/discord/skill
      target: ~/.claude/skills/Discord

    # ─── Claude Code hooks ────────────────────────────────────
    # Hook source filenames keep grove-era names (GroveContext.hook.ts,
    # EventLogger.hook.ts, bash-guard.hook.ts) so the in-repo tree stays
    # operator-facing-stable while internals migrate. The installed symlink
    # targets ARE renamed to Cortex* so settings.json references are
    # cortex-side and don't collide with grove leftovers.
    - source: src/taps/cc-events/hooks/GroveContext.hook.ts
      target: ~/.claude/hooks/CortexContext.hook.ts
    - source: src/taps/cc-events/hooks/EventLogger.hook.ts
      target: ~/.claude/hooks/CortexEventLogger.hook.ts
    - source: src/runner/hooks/bash-guard.hook.ts
      target: ~/.claude/hooks/CortexBashGuard.hook.ts
    # cortex#710 (C-701 Part B) — per-skill grant PreToolUse hook. Installed
    # as a symlink ONLY (no `hooks:` entry below) so it is NEVER registered in
    # the principal's GLOBAL settings.json — it would otherwise gate the
    # principal's own Skill invocations. It is registered PER-SESSION in the
    # curated `--settings` file (session-settings.ts) for bot sessions that
    # carry skill grants. The symlink must exist so that curated file can
    # reference the installed absolute path.
    - source: src/runner/hooks/skill-guard.hook.ts
      target: ~/.claude/hooks/CortexSkillGuard.hook.ts
    - source: src/taps/cc-events/hooks/lib
      target: ~/.claude/hooks/lib/cortex-events

    # ─── Relay policy directory ───────────────────────────────
    - source: src/taps/cc-events
      target: ~/.claude/relay/cortex

    # ─── Status line (cortex#96) ──────────────────────────────
    # Cortex inherits grove's statusline role. The main script falls
    # back gracefully when PAI_DIR or its caches are absent, so the
    # statusline keeps rendering on hosts without PAI installed.
    - source: src/statusline/statusline-command.sh
      target: ~/.claude/statusline-command.sh
    - source: src/statusline/cortex-status.sh
      target: ~/.claude/cortex-status.sh

  hooks:
    - event: SessionStart
      command: ${PAI_DIR}/hooks/CortexContext.hook.ts
    - event: PostToolUse
      command: ${PAI_DIR}/hooks/CortexEventLogger.hook.ts
    - event: Stop
      command: ${PAI_DIR}/hooks/CortexEventLogger.hook.ts
    - event: UserPromptSubmit
      command: ${PAI_DIR}/hooks/CortexEventLogger.hook.ts
    - event: PreToolUse
      command: ${PAI_DIR}/hooks/CortexBashGuard.hook.ts
      matcher: Bash

# Lifecycle scripts (mirror grove-v2 three-stage pattern):
#   - preupgrade.sh  — stop daemons + clean stale symlinks before swap
#   - postinstall.sh — first-time install: runtime dirs + plist render +
#                      config template check (does NOT clobber existing
#                      ~/.config/cortex/cortex.yaml — operator runs
#                      migrate-config separately per MIG-7.9)
#   - postupgrade.sh — re-link binaries + re-template plists + restart
#
# Top-level key is `scripts:` (not `hooks:`) — same shape grove-v2 has used
# in production since at least v0.22.x (see
# `the-metafactory/grove-v2/arc-manifest.yaml`). The pre-MIG-7 cortex
# manifest carried a `hooks: { postupgrade: … }` shorthand from the
# MIG-6 bootstrap that didn't match arc's schema; this PR aligns with
# arc's actual schema as exercised by grove-v2's working installs.
# (Holly cortex#52 round 2 warning.)
scripts:
  postinstall: ./scripts/postinstall.sh
  preupgrade: ./scripts/preupgrade.sh
  postupgrade: ./scripts/postupgrade.sh

# Dependencies — cortex#79 pins arc >= 0.25.0. That's the release that
# ships the stable `arc.nats.v1` JSON contract on the four `arc nats *`
# commands (per arc#134, closes arc#131). `cortex creds issue/revoke/rotate`
# shell out to `arc nats …  --json`; without that contract the CLI's
# parse layer would have to fall back to scraping human-readable stdout.
# See docs/design-arc-agent-bots.md §6.3 for the full delegation model.
dependencies:
  - name: "arc"
    version: ">=0.25.0"
# myelin deps still pending — declared once cortex's runtime depends on
